<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2P Pro Messenger</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --primary: #075e54; --accent: #25d366; --bg: #0b141a; 
            --card-bg: #111b21; --text-main: #e9edef; --text-sub: #8696a0;
            --header-bg: #202c33; --chat-bg: #0b141a; --my-msg: #005c4b;
            --other-msg: #202c33; --input-bg: #2a3942;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); margin: 0; 
            display: flex; justify-content: center; 
            height: 100dvh; overflow: hidden; color: var(--text-main);
        }
        .messenger { 
            width: 100%; max-width: 450px; background: var(--card-bg); 
            display: flex; flex-direction: column; height: 100%;
            padding-bottom: env(safe-area-inset-bottom); /* Захист від панелі iOS */
        }

        .tabs { display: flex; background: var(--primary); min-height: 50px; flex-shrink: 0; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; opacity: 0.6; font-size: 13px; border-bottom: 3px solid transparent; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--accent); }

        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 8px; gap: 5px; }
        .page { display: none; height: 100%; flex-direction: column; overflow: hidden; }
        .page.active { display: flex; }

        .header { background: var(--header-bg); padding: 8px; border-radius: 8px; flex-shrink: 0; }
        .id-row { display: flex; justify-content: space-between; align-items: center; font-size: 10px; margin-bottom: 5px; }
        .id-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; font-family: monospace; }
        
        .btn-group { display: flex; gap: 4px; }
        .s-btn { background: #128c7e; color: white; border: none; padding: 5px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        
        .conn-input-row { display: flex; gap: 4px; }
        .conn-input-row input { flex: 1; background: var(--bg); border: 1px solid var(--input-bg); padding: 8px; border-radius: 6px; color: #fff; font-size: 13px; outline: none; }
        .btn-ok { background: #007bff; color: white; border: none; padding: 0 12px; border-radius: 6px; font-weight: bold; }

        #chat { flex: 1; overflow-y: auto; padding: 8px; background: var(--chat-bg); border-radius: 8px; display: flex; flex-direction: column; gap: 6px; border: 1px solid var(--header-bg); }
        .msg { padding: 6px 10px; border-radius: 8px; max-width: 85%; font-size: 14px; }
        .msg.me { align-self: flex-end; background: var(--my-msg); }
        .msg.other { align-self: flex-start; background: var(--other-msg); }
        .sys { align-self: center; font-size: 10px; color: var(--text-sub); }

        .input-bar { display: flex; gap: 6px; align-items: center; padding: 8px 0; flex-shrink: 0; }
        .file-btn { font-size: 20px; background: none; border: none; color: var(--text-sub); cursor: pointer; padding: 0 5px; }
        .input-bar input[type="text"] { flex: 1; background: var(--input-bg); border: none; padding: 10px 15px; border-radius: 20px; color: #fff; font-size: 15px; outline: none; }
        .send-btn { background: var(--primary); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; flex-shrink: 0; }

        .video-box { position: relative; background: #000; border-radius: 12px; flex: 1; overflow: hidden; min-height: 150px; }
        #remote-v { width: 100%; height: 100%; object-fit: cover; }
        #local-v { width: 70px; height: 95px; position: absolute; bottom: 8px; right: 8px; border-radius: 6px; border: 1px solid #fff; object-fit: cover; z-index: 5; }
        
        .video-ctrls { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 8px 0; flex-shrink: 0; }
        .v-btn { padding: 14px 5px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="messenger">
    <div class="tabs">
        <div class="tab active" onclick="showP('chat-p', this)">ЧАТ</div>
        <div class="tab" onclick="showP('video-p', this)">ДЗВІНОК</div>
    </div>

    <div class="content">
        <div class="header">
            <div class="id-row">
                <div class="id-text">ID: <span id="my-id">...</span></div>
                <div class="btn-group">
                    <button class="s-btn" onclick="copyId()">COPY</button>
                    <button class="s-btn" onclick="shareL()">SHARE</button>
                </div>
            </div>
            <div class="conn-input-row">
                <input type="text" id="remote-id" placeholder="ID друга">
                <button class="btn-ok" onclick="manualConn()" id="btn-conn">OK</button>
            </div>
        </div>

        <div id="chat-p" class="page active">
            <div id="chat"></div>
            <div class="input-bar">
                <button class="file-btn" onclick="document.getElementById('f-in').click()">📎</button>
                <input type="file" id="f-in" style="display:none" onchange="sendFile(this)">
                <input type="text" id="m-in" placeholder="Повідомлення..." onkeydown="if(event.key==='Enter') sendT()">
                <button class="send-btn" onclick="sendT()">➤</button>
            </div>
        </div>

        <div id="video-p" class="page">
            <div class="video-box">
                <video id="remote-v" autoplay playsinline></video>
                <video id="local-v" autoplay muted playsinline></video>
            </div>
            <div class="video-ctrls">
                <button class="v-btn" style="background: #25d366; grid-column: span 2;" onclick="startC()">📞 ПОДЗВОНИТИ</button>
                <button class="v-btn" style="background: #ea0038; grid-column: span 2;" onclick="endC()">✖ ЗАВЕРШИТИ</button>
            </div>
        </div>
    </div>
</div>

<script>
    const peer = new Peer({
        config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }]}
    });

    let conn, localStream;

    peer.on('open', id => { 
        document.getElementById('my-id').innerText = id;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('peer')) {
            document.getElementById('remote-id').value = urlParams.get('peer');
            setTimeout(manualConn, 1000);
        }
    });

    peer.on('connection', c => { 
        conn = c; 
        setupConn(); 
        addMsg("СИСТЕМА", "Підключено", "sys"); 
    });

    peer.on('call', async call => {
        if (confirm("Вхідний дзвінок! Відповісти?")) {
            showP('video-p', document.querySelectorAll('.tab')[1]);
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('local-v').srcObject = localStream;
            call.answer(localStream);
            call.on('stream', s => document.getElementById('remote-v').srcObject = s);
        }
    });

    function manualConn() {
        const id = document.getElementById('remote-id').value.trim();
        if (!id || id === peer.id) return;
        conn = peer.connect(id);
        setupConn();
    }

    function setupConn() {
        conn.on('open', () => { 
            document.getElementById('btn-conn').innerText = "✓";
            addMsg("СИСТЕМА", "Зв'язок є", "sys");
        });
        conn.on('data', data => {
            if (data.file) {
                const blob = new Blob([data.blob], {type: data.type});
                const url = URL.createObjectURL(blob);
                addMsg("ДРУГ", `<a href="${url}" download="${data.name}" style="color:var(--accent)">📎 Файл: ${data.name}</a>`, "other");
            } else {
                addMsg("ДРУГ", data, "other");
            }
        });
    }

    function sendT() {
        const input = document.getElementById('m-in');
        if (conn && conn.open && input.value) {
            conn.send(input.value);
            addMsg("Я", input.value, "me");
            input.value = "";
        }
    }

    function sendFile(input) {
        const file = input.files[0];
        if (!file || !conn || !conn.open) return;
        const reader = new FileReader();
        reader.onload = () => {
            conn.send({ file: true, name: file.name, type: file.type, blob: reader.result });
            addMsg("Я", `📎 Файл відправлено: ${file.name}`, "me");
        };
        reader.readAsArrayBuffer(file);
    }

    function addMsg(who, text, cls) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = "msg " + cls;
        div.innerHTML = cls === "sys" ? text : `<b>${who}:</b> ${text}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function startC() {
        const rId = document.getElementById('remote-id').value;
        if(!rId) return alert("Введіть ID");
        localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        document.getElementById('local-v').srcObject = localStream;
        const call = peer.call(rId, localStream);
        call.on('stream', s => document.getElementById('remote-v').srcObject = s);
    }

    function endC() { location.reload(); }

    function showP(pId, tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(pId).classList.add('active');
        tab.classList.add('active');
    }

    function copyId() {
        navigator.clipboard.writeText(document.getElementById('my-id').innerText).then(() => alert("Скопійовано"));
    }

    function shareL() {
        const url = `${window.location.origin}${window.location.pathname}?peer=${document.getElementById('my-id').innerText}`;
        if (navigator.share) navigator.share({ title: 'P2P', url: url });
        else { navigator.clipboard.writeText(url); alert("Link copied"); }
    }
</script>
</body>
</html>
