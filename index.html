<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Messenger</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --primary: #075e54; --accent: #25d366; --bg: #0b141a; 
            --card-bg: #111b21; --text-main: #e9edef; --text-sub: #8696a0;
            --header-bg: #202c33; --chat-bg: #0b141a; --my-msg: #005c4b;
            --other-msg: #202c33; --input-bg: #2a3942;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; height: 100dvh; overflow: hidden; color: var(--text-main); }
        .messenger { width: 100%; max-width: 450px; background: var(--card-bg); display: flex; flex-direction: column; height: 100%; }

        /* Таби */
        .tabs { display: flex; background: var(--primary); color: white; min-height: 45px; }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; opacity: 0.6; font-size: 14px; border-bottom: 3px solid transparent; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--accent); }

        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 10px; gap: 8px; }
        .page { display: none; height: 100%; flex-direction: column; overflow: hidden; }
        .page.active { display: flex; }

        /* Шапка з ID - зроблена компактніше для iPhone Mini */
        .header { background: var(--header-bg); padding: 8px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .id-info { font-size: 11px; word-break: break-all; color: var(--text-sub); line-height: 1.2; }
        .id-info b { color: var(--text-main); font-family: monospace; font-size: 12px; }
        
        .action-row { display: flex; gap: 5px; align-items: center; }
        .small-btn { flex: 1; background: #128c7e; color: white; border: none; padding: 8px 5px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
        
        .connect-row { display: flex; gap: 5px; margin-top: 2px; }
        .connect-row input { flex: 1; padding: 8px; border: 1px solid var(--input-bg); border-radius: 6px; font-size: 14px; background: var(--bg); color: #fff; outline: none; min-width: 0; }
        .btn-ok { background: #007bff; color: white; border: none; padding: 0 15px; border-radius: 6px; font-weight: bold; }

        /* Чат */
        #chat { flex: 1; overflow-y: auto; padding: 8px; background: var(--chat-bg); border-radius: 8px; display: flex; flex-direction: column; gap: 8px; border: 1px solid var(--header-bg); }
        .msg { padding: 6px 10px; border-radius: 8px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--my-msg); }
        .msg.other { align-self: flex-start; background: var(--other-msg); }
        .sys-msg { align-self: center; font-size: 10px; color: var(--text-sub); opacity: 0.7; }

        .input-area { display: flex; gap: 5px; padding: 8px 0; flex-shrink: 0; }
        .input-area input { flex: 1; background: var(--input-bg); border: none; padding: 10px 15px; border-radius: 20px; color: #fff; outline: none; font-size: 15px; }
        .send-btn { background: var(--primary); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; }

        /* Відео - Адаптація під висоту екрана */
        .video-container { position: relative; background: #000; border-radius: 12px; flex: 1; overflow: hidden; min-height: 200px; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { width: 80px; height: 110px; position: absolute; bottom: 8px; right: 8px; border-radius: 6px; border: 1.5px solid #fff; object-fit: cover; z-index: 5; background: #222; }
        
        .video-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding-top: 8px; flex-shrink: 0; }
        .v-btn { padding: 12px 5px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

<div class="messenger">
    <div class="tabs">
        <div class="tab active" onclick="showPage('chat-p', this)">ЧАТ</div>
        <div class="tab" onclick="showPage('video-p', this)">ДЗВІНОК</div>
    </div>

    <div class="content">
        <div class="header">
            <div class="id-info">Мій ID: <b id="my-id">...</b></div>
            <div class="action-row">
                <button class="small-btn" onclick="copyId()">Копіювати ID</button>
                <button class="small-btn" onclick="shareLink()">Поділитися</button>
            </div>
            <div class="connect-row">
                <input type="text" id="remote-id" placeholder="Вставте ID друга">
                <button class="btn-ok" onclick="manualConnect()" id="btn-conn">ОК</button>
            </div>
        </div>

        <div id="chat-p" class="page active">
            <div id="chat"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Повідомлення..." onkeydown="if(event.key==='Enter') sendText()">
                <button class="send-btn" onclick="sendText()">➤</button>
            </div>
        </div>

        <div id="video-p" class="page">
            <div class="video-container">
                <video id="remote-video" autoplay playsinline></video>
                <video id="local-video" autoplay muted playsinline></video>
            </div>
            <div class="video-controls">
                <button class="v-btn" style="background: #25d366; grid-column: span 2;" onclick="startCall()">📞 Подзвонити</button>
                <button class="v-btn" style="background: #ea0038; grid-column: span 2;" onclick="endCall()">✖ Завершити</button>
            </div>
        </div>
    </div>
</div>

<script>
    const peer = new Peer({
        config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }]}
    });

    let conn, localStream;

    peer.on('open', id => { 
        document.getElementById('my-id').innerText = id;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('peer')) {
            document.getElementById('remote-id').value = urlParams.get('peer');
            setTimeout(manualConnect, 800);
        }
    });

    peer.on('connection', c => { conn = c; setupConn(); addMsg("Система", "З'єднано", "sys-msg"); });

    peer.on('call', async call => {
        if (confirm("Вхідний дзвінок! Відповісти?")) {
            showPage('video-p', document.querySelectorAll('.tab')[1]);
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('local-video').srcObject = localStream;
            call.answer(localStream);
            call.on('stream', s => document.getElementById('remote-video').srcObject = s);
        }
    });

    function manualConnect() {
        const id = document.getElementById('remote-id').value.trim();
        if (!id || id === peer.id) return;
        conn = peer.connect(id);
        setupConn();
    }

    function setupConn() {
        conn.on('open', () => { 
            document.getElementById('btn-conn').innerText = "✓";
            addMsg("Система", "Зв'язок встановлено", "sys-msg");
        });
        conn.on('data', data => addMsg("Друг", data, "other"));
    }

    function sendText() {
        const input = document.getElementById('msg-input');
        if (conn && conn.open && input.value) {
            conn.send(input.value);
            addMsg("Я", input.value, "me");
            input.value = "";
        }
    }

    function addMsg(who, text, cls) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = "msg " + cls;
        div.innerHTML = cls === "sys-msg" ? text : `<b>${who}:</b> ${text}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function startCall() {
        const rId = document.getElementById('remote-id').value;
        if(!rId) return alert("Спочатку введіть ID");
        localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        document.getElementById('local-video').srcObject = localStream;
        const call = peer.call(rId, localStream);
        call.on('stream', s => document.getElementById('remote-video').srcObject = s);
    }

    function endCall() { location.reload(); }

    function showPage(pId, tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(pId).classList.add('active');
        tab.classList.add('active');
    }

    function copyId() {
        const id = document.getElementById('my-id').innerText;
        navigator.clipboard.writeText(id).then(() => alert("ID скопійовано"));
    }

    async function shareLink() {
        const id = document.getElementById('my-id').innerText;
        const url = `${window.location.origin}${window.location.pathname}?peer=${id}`;
        if (navigator.share) {
            navigator.share({ title: 'P2P Chat', url: url }).catch(() => {});
        } else {
            navigator.clipboard.writeText(url);
            alert("Посилання копійовано");
        }
    }
</script>
</body>
</html>
